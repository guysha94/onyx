[tools]
python = "3.13"


[vars]
DEPLOYMENT_DIR = "deployment/docker_compose"


[tasks.build]
description = "Build docker images"
run = "docker compose --env-file .env -f {{vars.DEPLOYMENT_DIR}}/docker-compose.yml build"

[tasks.dev]
description = "Run dev with compose watch"
run = "docker compose --env-file .env -f {{vars.DEPLOYMENT_DIR}}/docker-compose.yml -f {{vars.DEPLOYMENT_DIR}}/docker-compose.dev.yml up -d --build"


[tasks."dev:gpu"]
description = "Run dev with GPU and HTTPS (nginx + Let's Encrypt on 443)"
run = "docker compose --env-file .env -f {{vars.DEPLOYMENT_DIR}}/docker-compose.yml -f {{vars.DEPLOYMENT_DIR}}/docker-compose.dev.yml -f {{vars.DEPLOYMENT_DIR}}/docker-compose.gpu.yml -f {{vars.DEPLOYMENT_DIR}}/docker-compose.dev-ssl.yml up -d --build --wait"

[tasks."dev:gpu:bootstrap-nginx"]
description = "Restore temporary cert if nginx cannot start"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File {{vars.DEPLOYMENT_DIR}}/bootstrap-nginx-cert.ps1"

[tasks."dev:gpu:check-ports"]
description = "Verify router forwards public port 80/443 to nginx"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File {{vars.DEPLOYMENT_DIR}}/check-public-ports.ps1"

[tasks."dev:gpu:init-certs"]
description = "Bootstrap Let's Encrypt certs for dev:gpu (run once before first dev:gpu)"
run = "bash {{vars.DEPLOYMENT_DIR}}/init-letsencrypt-dev.sh"
run_windows = "powershell -NoProfile -ExecutionPolicy Bypass -File {{vars.DEPLOYMENT_DIR}}/init-letsencrypt-dev.ps1"

[tasks.down]
description = "Stop dev containers"
run = "docker compose --env-file .env -f {{vars.DEPLOYMENT_DIR}}/docker-compose.yml -f {{vars.DEPLOYMENT_DIR}}/docker-compose.dev.yml down"
